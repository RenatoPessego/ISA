<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<h:head>
    <title>Patient Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body class="container mt-4">
    <f:view contentType="text/html" encoding="UTF-8" />
    <h1 class="mb-4">Patient Management</h1>

    <!--form for adding or editing patients -->
    <h:form id="addPatientForm" styleClass="mb-5">
        <h2>#{patientBean.editing ? 'Edit Patient' : 'Add New Patient'}</h2>
        <h:messages globalOnly="true" styleClass="alert alert-danger"/>

        <div class="row g-3">
            <!--name input -->
            <div class="col-md-6">
                <h:outputLabel for="name" value="Name:"/>
                <h:inputText id="name" value="#{patientBean.selectedPatient.name}" required="true"
                             requiredMessage="Please enter the name." styleClass="form-control">
                </h:inputText>
                <h:message for="name" styleClass="text-danger small"/>


            </div>

            <!--surname input-->
            <div class="col-md-6">
                <h:outputLabel for="surname" value="Surname:"/>
                <h:inputText id="surname" value="#{patientBean.selectedPatient.surname}" required="true"
                             requiredMessage="Please enter the surname." styleClass="form-control">
                </h:inputText>
                <h:message for="surname" styleClass="text-danger small"/>

            </div>

            <!--email input-->
            <div class="col-md-6">
                <h:outputLabel for="email" value="Email:"/>
                <h:inputText id="email" value="#{patientBean.selectedPatient.email}" required="true"
                             requiredMessage="Please enter a valid email." styleClass="form-control">
                </h:inputText>
                <h:message for="email" styleClass="text-danger small"/>


            </div>

            <!--date of birth-->
            <div class="col-md-6">
                <h:outputLabel for="dob" value="Date of Birth (dd-MM-yyyy):"/>
                <h:inputText id="dob" value="#{patientBean.selectedPatient.dateOfBirth}" required="true"
                             requiredMessage="Please enter the date of birth." styleClass="form-control">
                    <f:converter converterId="localDateConverter"/>
                </h:inputText>
                <h:message for="dob" styleClass="text-danger small"/>


            </div>

            <!--doctor-->
            <div class="col-md-6">
                <h:outputLabel for="doctor" value="Doctor:"/>
                <h:selectOneMenu id="doctor" value="#{patientBean.selectedPatient.doctor}" styleClass="form-select" converter="doctorConverter">
                    <f:selectItem itemLabel="-- Select Doctor --" itemValue="#{null}"/>
                    <f:selectItems value="#{patientBean.allDoctors}" var="doc"
                                   itemValue="#{doc}" itemLabel="#{doc.name} #{doc.surname}"/>
                </h:selectOneMenu>
                <h:message for="doctor" styleClass="text-danger small"/>
            </div>


            <!--details-->
            <div class="col-md-6">
                <h:outputLabel for="details" value="Details:"/>
                <h:inputTextarea id="details" styleClass="form-control" value="#{patientBean.selectedPatient.details}" rows="3"/>
            </div>
        </div>

        <!--submit buttons-->
        <div class="mt-4 text-center">
            <!-- show add patient if no patient is selected, or update cliente if a patient is already selected -->
            <h:commandButton value="#{patientBean.editing ? 'Update Patient' : 'Add Patient'}" styleClass="btn btn-primary"
                             action="#{patientBean.savePatient}">
                <f:ajax execute="@form" render="addPatientForm patientTableForm"/>
            </h:commandButton>

            <!--if editing, show a cancel button that calls the cancel edit function -->
            <h:commandButton value="Cancel" action="#{patientBean.cancelEdit}" rendered="#{patientBean.editing}" styleClass="btn btn-secondary ms-2">
                <f:ajax execute="@this" render="addPatientForm patientTableForm"/>
            </h:commandButton>
        </div>
    </h:form>

    <!--table of patients with doctor. Each patient has their id, name, surname, email and doctor shown by defaul on this table. TO see more details there the view button that redirects to a proper page with every detail-->
    <h2>Patient List</h2>
    <h:form id="patientTableForm">
        <h:dataTable id="patientTable" value="#{patientBean.patientsWithDoctor}" var="patient" styleClass="table table-bordered table-striped">
            <h:column><f:facet name="header">ID</f:facet>#{patient.id}</h:column>
            <h:column><f:facet name="header">Name</f:facet>#{patient.name}</h:column>
            <h:column><f:facet name="header">Surname</f:facet>#{patient.surname}</h:column>
            <h:column><f:facet name="header">Email</f:facet>#{patient.email}</h:column>
            <h:column><f:facet name="header">Doctor</f:facet>#{patient.doctor}</h:column>
            <h:column>
                <f:facet name="header">Actions</f:facet>
                <div class="d-flex gap-1 justify-content-center">
                    <!--view button -->
                    <h:commandButton value="View" action="#{patientBean.viewPatientDetails(patient.id)}" styleClass="btn btn-info btn-sm">
                        <f:setPropertyActionListener target="#{patientBean.selectedPatient}" value="#{patient}"/>
                        <f:ajax execute="@this" render="@all"/>
                    </h:commandButton>

                    <!--edit button, that selects that patient and puts his infromation on the form so the user can edit them and update the patient -->
                    <h:commandButton value="Edit" action="#{patientBean.editPatient(patient)}" styleClass="btn btn-warning btn-sm">
                        <f:ajax render="addPatientForm"/>
                    </h:commandButton>

                    <!--delete button -->
                    <h:commandButton value="Delete" action="#{patientBean.deletePatient(patient.id)}" styleClass="btn btn-danger btn-sm"
                                     onclick="return confirm('Are you sure?');">
                        <f:ajax render="patientTableForm addPatientForm"/>
                    </h:commandButton>
                </div>
            </h:column>
        </h:dataTable>

        <div class="row mt-3">
            <!--link to patients without doctor-->
            <div class="col-md-6">
                <h:commandLink value="View Patients Without Doctor" action="patientsWithoutDoctor?faces-redirect=true" styleClass="btn btn-primary w-100"/>
            </div>
            <!-- link to view doctors -->
            <div class="col-md-6 text-end">
                <h:commandLink value="View Doctors" action="doctors?faces-redirect=true" styleClass="btn btn-success w-100"/>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-md-12">
                <h:outputLink value="#{request.contextPath}/remotePatients" styleClass="btn btn-primary w-100">
                    View Patients Without Doctor (HTML)
                </h:outputLink>
            </div>
        </div>
    </h:form>
</h:body>
</html>
