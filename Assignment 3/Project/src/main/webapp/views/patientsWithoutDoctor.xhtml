<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<h:head>
    <title>Patients Without Doctor</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body class="container mt-4">
    <h1 class="mb-4">Patients Without Doctor</h1>

    <!--table showing patients without assigned doctors, just like the table with patients but without the doctor column of the table -->
    <h:form id="patientsNoDoctorForm">
        <h:dataTable id="noDoctorTable" value="#{patientBean.patientsWithoutDoctor}" var="patient"
                     styleClass="table table-striped table-bordered">
            <h:column><f:facet name="header">ID</f:facet>#{patient.id}</h:column>
            <h:column><f:facet name="header">Name</f:facet>#{patient.name}</h:column>
            <h:column><f:facet name="header">Surname</f:facet>#{patient.surname}</h:column>
            <h:column><f:facet name="header">Email</f:facet>#{patient.email}</h:column>

            <h:column>
                <f:facet name="header">Actions</f:facet>
                <div class="d-flex gap-1 justify-content-center">
                    <!--Same buttons as the other table. view Button -->
                    <h:commandButton value="View" action="#{patientBean.viewPatientDetails(patient.id)}"
                                     styleClass="btn btn-info btn-sm">
                        <f:setPropertyActionListener target="#{patientBean.selectedPatient}" value="#{patient}"/>
                        <f:ajax execute="@this" render="@all"/>
                    </h:commandButton>

                    <!--edit Button-->
                    <h:commandButton value="Edit" action="#{patientBean.editPatient(patient)}"
                                     styleClass="btn btn-warning btn-sm">
                        <f:ajax render="addPatientForm"/>
                    </h:commandButton>

                    <!--delete Button-->
                    <h:commandButton value="Delete" action="#{patientBean.deletePatient(patient.id)}"
                                     styleClass="btn btn-danger btn-sm"
                                     onclick="return confirm('Are you sure?');">
                        <f:ajax render="patientsNoDoctorForm"/>
                    </h:commandButton>
                </div>
            </h:column>
        </h:dataTable>
    </h:form>

    <!--back to main list button-->
    <h:form styleClass="mt-4 text-center">
        <h:commandButton value="Back to Patient List" action="#{patientBean.goToPatientList}"
                         styleClass="btn btn-secondary"/>
    </h:form>
</h:body>
</html>
