<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

<h:head>
    <title>Patient Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body class="container mt-4">
    <h1 class="mb-4">Patient Details</h1>

    <!--panel only visible if a patient is selected. Shows every information from the patient-->
    <h:panelGroup rendered="#{patientBean.selectedPatient != null}" layout="block" styleClass="card p-4 shadow-sm">

        <h:panelGrid columns="2" columnClasses="fw-bold pe-3,text-start" styleClass="table table-borderless">
            <h:outputText value="Name:"/>
            <h:outputText value="#{patientBean.selectedPatient.name}"/>

            <h:outputText value="Surname:"/>
            <h:outputText value="#{patientBean.selectedPatient.surname}"/>

            <h:outputText value="Email:"/>
            <h:outputText value="#{patientBean.selectedPatient.email}"/>

            <h:outputText value="Date of Birth:"/>
            <h:outputText value="#{patientBean.selectedPatient.dateOfBirth}">
                <f:converter converterId="localDateConverter"/>
            </h:outputText>

            <h:outputText value="Doctor:"/>
            <h:outputText value="#{patientBean.selectedPatient.doctor}"/>

            <h:outputText value="Details:"/>
            <h:outputText value="#{patientBean.selectedPatient.details}"/>
        </h:panelGrid>

        <!--navigation Buttons. Go to main page and to table with patients without doctors -->
        <div class="mt-4 d-flex justify-content-center gap-3">
            <h:form>
                <h:commandButton value="Go to Main Page" action="#{patientBean.goToPatientList}" styleClass="btn btn-primary">
                    <f:setPropertyActionListener target="#{patientBean.selectedPatient}" value="#{null}"/>
                </h:commandButton>
            </h:form>
            <h:form>
                <h:commandButton value="Go to Patients Without Doctor" action="#{patientBean.goToPatientWDList}" styleClass="btn btn-secondary">
                    <f:setPropertyActionListener target="#{patientBean.selectedPatient}" value="#{null}"/>
                </h:commandButton>
            </h:form>
        </div>
    </h:panelGroup>
</h:body>
</html>
